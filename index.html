<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏢 AIカンパニー・オフィス</title>
<style>
  :root{
    --bg:#0f1220; --panel:#171b2e; --panel2:#1e2340; --line:#2a3052;
    --text:#e6e9f5; --dim:#8b93b8; --gold:#fbbf24; --green:#4ade80;
    --red:#f87171; --blue:#60a5fa; --purple:#c084fc;
    --floor1:#3a3350; --floor2:#443c5e; --wall:#262040;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:"Hiragino Sans","Yu Gothic",sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}

  /* ===== ヘッダー ===== */
  header{display:flex;align-items:center;gap:14px;padding:10px 16px;background:var(--panel);border-bottom:1px solid var(--line);flex-wrap:wrap}
  header h1{font-size:16px;white-space:nowrap}
  .modes{display:flex;background:var(--bg);border-radius:8px;padding:3px;gap:3px}
  .modes button{border:none;background:transparent;color:var(--dim);padding:5px 12px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600}
  .modes button.on{background:var(--panel2);color:var(--text)}
  .kpis{display:flex;gap:8px;flex-wrap:wrap;margin-left:auto}
  .kpi{background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:4px 10px;text-align:center;min-width:78px}
  .kpi .l{font-size:10px;color:var(--dim)}
  .kpi .v{font-size:14px;font-weight:700;font-variant-numeric:tabular-nums}
  .kpi .v.gold{color:var(--gold)} .kpi .v.green{color:var(--green)} .kpi .v.red{color:var(--red)} .kpi .v.blue{color:var(--blue)} .kpi .v.purple{color:var(--purple)}

  /* ===== レイアウト ===== */
  main{flex:1;display:flex;min-height:0}
  #officeWrap{flex:1.5;position:relative;overflow:auto;background:var(--wall)}
  aside{width:370px;min-width:300px;border-left:1px solid var(--line);background:var(--panel);display:flex;flex-direction:column;overflow-y:auto}
  #runsMain{flex:1;overflow-y:auto;padding:16px;display:none;flex-direction:column;gap:12px;max-width:860px;margin:0 auto;width:100%}
  @media (max-width:900px){
    body{height:auto;min-height:100dvh;overflow:auto}
    main{flex-direction:column;flex:none}
    #officeWrap{flex:none;height:44vh;min-height:300px;overflow:auto}
    aside{width:100%;min-width:0;border-left:none;border-top:1px solid var(--line);flex:none;overflow:visible}
  }

  /* ===== オフィス（ライブビュー） ===== */
  #office{position:relative;width:100%;min-height:100%;
    background:
      repeating-linear-gradient(0deg, transparent 0 46px, rgba(0,0,0,.14) 46px 48px),
      repeating-linear-gradient(90deg, transparent 0 46px, rgba(0,0,0,.14) 46px 48px),
      linear-gradient(var(--floor1),var(--floor2));
  }
  #office::before{content:"";position:absolute;top:0;left:0;right:0;height:64px;background:var(--wall);border-bottom:4px solid #191430}
  .window{position:absolute;top:8px;width:110px;height:44px;border-radius:6px;border:3px solid #191430;background:linear-gradient(#1c2c54,#2c4a7c);overflow:hidden}
  .window::after{content:"🌙";position:absolute;right:8px;top:4px;font-size:14px;opacity:.9}
  .deco{position:absolute;font-size:26px;filter:drop-shadow(0 3px 2px rgba(0,0,0,.4))}
  .desk{position:absolute;width:150px;text-align:center;transition:left .5s,top .5s}
  .desk .table{margin:0 auto;width:120px;height:46px;background:linear-gradient(#8a6a4a,#6e5238);border-radius:8px;border:2px solid #4d3a26;box-shadow:0 5px 0 #3d2e1e;position:relative}
  .desk .table::after{content:"🖥️";position:absolute;left:50%;transform:translateX(-50%);top:6px;font-size:20px}
  .desk.owner .table{background:linear-gradient(#a98d5f,#8a7040);border-color:#5c4a28;width:140px}
  .desk .chair{font-size:34px;line-height:1;position:relative;display:inline-block;margin-top:-4px}
  .desk .chair .dot{position:absolute;right:-2px;bottom:2px;width:11px;height:11px;border-radius:50%}
  .dot.working{background:var(--green)} .dot.idle{background:#94a3b8} .dot.blocked{background:var(--red)} .dot.waiting_owner{background:var(--gold)}
  .desk.working .chair{animation:bob 1s infinite}
  @keyframes bob{50%{transform:translateY(-3px)}}
  .desk .name{font-size:11px;font-weight:700;background:rgba(0,0,0,.45);border-radius:5px;display:inline-block;padding:2px 8px;margin-top:3px}
  .desk .role{font-size:9px;color:#cfd5ef;opacity:.85}
  .bubble{position:absolute;bottom:calc(100% + 2px);left:50%;transform:translateX(-50%);background:#fff;color:#1a1d33;font-size:10px;line-height:1.35;border-radius:9px;padding:5px 9px;max-width:150px;min-width:60px;box-shadow:0 3px 8px rgba(0,0,0,.35);z-index:5}
  .bubble::after{content:"";position:absolute;top:100%;left:50%;transform:translateX(-50%);border:6px solid transparent;border-top-color:#fff}
  .bubble.zzz{background:#dfe3f2;color:#7b83a8;font-style:italic}

  /* ===== サイドバー ===== */
  section{padding:12px 14px;border-bottom:1px solid var(--line)}
  section h2{font-size:12px;color:var(--dim);letter-spacing:.08em;margin-bottom:8px;display:flex;align-items:center;gap:6px}
  section h2 .count{background:var(--gold);color:#000;border-radius:10px;font-size:10px;padding:1px 7px}
  .card{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:8px}
  .card.decision{border-color:var(--gold)}
  .card .t{font-size:13px;font-weight:700;margin-bottom:4px}
  .card .d{font-size:11px;color:var(--dim);line-height:1.6;margin-bottom:8px}
  .board{background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:8px 10px;margin-bottom:8px;font-size:10.5px;line-height:1.6}
  .board .rec{color:var(--gold);font-weight:700;margin-bottom:5px}
  .board ul{list-style:none;margin:1px 0 5px;padding:0}
  .board ul li{padding-left:12px;position:relative;color:#c3c9e4}
  .board ul.plus li::before{content:"＋";position:absolute;left:0;color:var(--green)}
  .board ul.minus li::before{content:"−";position:absolute;left:0;color:var(--red)}
  .board .voices{border-top:1px dashed #232948;padding-top:5px;color:var(--dim);font-size:10px}
  .empty{font-size:11px;color:var(--dim);padding:4px 0}
  .member{display:flex;align-items:center;gap:9px;padding:6px 4px;border-bottom:1px dashed #232948}
  .member:last-child{border-bottom:none}
  .member .av{font-size:22px}
  .member .info{flex:1;min-width:0}
  .member .nm{font-size:12px;font-weight:700}
  .member .nm span{font-weight:400;color:var(--dim);font-size:10px;margin-left:5px}
  .member .tk{font-size:10px;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .member .st{font-size:9px;border-radius:5px;padding:2px 6px;white-space:nowrap}
  .st.working{background:#173626;color:var(--green)} .st.idle{background:#252b45;color:#94a3b8}
  .st.blocked{background:#3a1d1d;color:var(--red)} .st.waiting_owner{background:#3a3012;color:var(--gold)}
  #log{font-size:11px;line-height:1.8;color:#c3c9e4}
  #log .day{color:var(--dim);margin-right:6px;font-variant-numeric:tabular-nums}
  #liveNotice{font-size:11px;color:var(--gold);background:#2c2410;border:1px solid #574a1a;border-radius:8px;padding:8px 10px;margin:12px 14px 0}
  #liveNotice.ok{color:var(--green);background:#12271b;border-color:#1e4a30}
  details.ghset summary{cursor:pointer;font-size:12px;color:var(--dim);letter-spacing:.08em}
  .ghform{display:flex;flex-direction:column;gap:6px;margin-top:8px}
  .ghform input{background:var(--bg);border:1px solid var(--line);border-radius:7px;color:var(--text);padding:7px 9px;font-size:12px}
  .ghform .row{display:flex;gap:6px}
  .ghform button{border:1px solid var(--line);background:var(--panel2);color:var(--text);border-radius:7px;padding:6px 12px;cursor:pointer;font-size:12px}
  .ghform .hint{font-size:10px;color:var(--dim);line-height:1.6}

  /* ===== 経営ラン ビューア ===== */
  .runbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .runbar select{background:var(--panel2);border:1px solid var(--line);border-radius:8px;color:var(--text);padding:8px 10px;font-size:13px;flex:1;min-width:200px}
  .runstatus{font-size:11px;border-radius:6px;padding:4px 10px;font-weight:700;white-space:nowrap}
  .runstatus.running{background:#173626;color:var(--green);animation:blink 1.6s infinite}
  .runstatus.exit{background:#3a3012;color:var(--gold)}
  .runstatus.bankrupt{background:#3a1d1d;color:var(--red)}
  .runstatus.horizon_end,.runstatus.stalled{background:#252b45;color:#94a3b8}
  @keyframes blink{50%{opacity:.55}}
  .runcard{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 16px}
  .runcard h3{font-size:14px;margin-bottom:6px}
  .runcard .sub{font-size:11px;color:var(--dim);line-height:1.7}
  .verdict{border-width:2px}
  .verdict.exit{border-color:var(--gold)} .verdict.bankrupt{border-color:var(--red)}
  .verdict .big{font-size:20px;font-weight:800;margin:4px 0}
  .period{border-left:3px solid var(--line)}
  .period .pk{font-weight:400;font-size:10.5px;color:var(--dim);margin-left:8px}
  .period .act{font-size:11px;line-height:1.7;color:#c3c9e4;padding-left:4px}
  .period .act b{color:var(--text)}
  .period .ev{font-size:11px;line-height:1.6;margin-top:5px;padding:5px 8px;border-radius:6px;background:var(--bg)}
  .period .ev.wall{border-left:3px solid var(--red);color:#f0b9b9}
  .period .ev.event{border-left:3px solid var(--blue)}
  .walls li{font-size:11.5px;line-height:1.8;color:#f0b9b9}
  .walls{list-style:"⚠️ ";padding-left:22px}
  .learn li{font-size:11.5px;line-height:1.8;color:#c3e4c9}
  .learn{list-style:"💡 ";padding-left:22px}
  #runEmpty{color:var(--dim);font-size:12px;line-height:2;padding:30px;text-align:center}
</style>
</head>
<body>

<header>
  <h1>🏢 <span id="coName">AIカンパニー</span></h1>
  <div class="modes">
    <button id="mOffice" class="on" onclick="setMode('office')">🏢 オフィス</button>
    <button id="mRuns" onclick="setMode('runs')">🧪 経営ラン</button>
  </div>
  <div class="kpis" id="kpis"></div>
</header>

<main id="officeMain">
  <div id="officeWrap"><div id="office"></div></div>
  <aside>
    <div id="liveNotice"></div>
    <section>
      <h2>👑 株主決裁ボックス（青野さんの専権）<span class="count" id="decCount" style="display:none">0</span></h2>
      <div id="decisions"><div class="empty">いま判断待ちの案件はありません。</div></div>
    </section>
    <section>
      <h2>👥 AI社員</h2>
      <div id="members"></div>
    </section>
    <section>
      <h2>📜 ログ</h2>
      <div id="log"></div>
    </section>
    <section>
      <details class="ghset">
        <summary>☁️ リモート設定（GitHub経由で state を読む）</summary>
        <div class="ghform">
          <input id="ghRepo" placeholder="リポジトリ（例: nextstage011/ai-company-state）">
          <input id="ghBranch" placeholder="ブランチ（空欄なら main）">
          <input id="ghToken" type="password" placeholder="読み取り専用トークン（Fine-grained PAT）">
          <div class="row">
            <button onclick="saveGh()">保存</button>
            <button onclick="clearGh()">削除</button>
          </div>
          <div class="hint" id="ghMsg"></div>
          <div class="hint">出先からの閲覧用。ローカルの state が読めない時だけ GitHub API を使います。設定は<b>この端末のブラウザ内にだけ</b>保存されます。</div>
        </div>
      </details>
    </section>
  </aside>
</main>

<main id="runsMain">
  <div class="runbar">
    <select id="runSel" onchange="selectRun(this.value)"></select>
    <span class="runstatus" id="runStatus" style="display:none"></span>
  </div>
  <div id="runBody">
    <div id="runEmpty">まだ経営ランがありません。<br>このMacの Claude Code に<b>「経営ランを回して」</b>と伝えると、<br>検証済みプランを元にAI経営陣が仮想経営を開始し、ここに月次で経過が流れます。</div>
  </div>
</main>

<script>
'use strict';

const YEN = n => {
  const a = Math.abs(n);
  if (a >= 1e8) return (n/1e8).toFixed(2) + '億円';
  if (a >= 1e4) return Math.round(n/1e4).toLocaleString() + '万円';
  return Math.round(n).toLocaleString() + '円';
};
const $ = id => document.getElementById(id);
function esc(s){ return String(s??'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
const STATUS_JA = {working:'稼働中', idle:'待機', blocked:'ブロック', waiting_owner:'決裁待ち'};
const RUN_STATUS_JA = {running:'🟢 進行中', exit:'🎉 Exit達成', bankrupt:'💧 資金ショート', horizon_end:'⏳ 期間満了', stalled:'⏸ 停滞終了'};

/* ---------------- GitHub リモート読み込み ---------------- */
const GH_KEY = 'ai-company-gh';
let lastGhPoll = 0;

function ghConf(){ try{ return JSON.parse(localStorage.getItem(GH_KEY)); }catch(e){ return null; } }
function ghMsg(t){ $('ghMsg').textContent = t; }
function saveGh(){
  const repo = $('ghRepo').value.trim(), branch = $('ghBranch').value.trim() || 'main', token = $('ghToken').value.trim();
  if (!repo || !token){ ghMsg('⚠️ リポジトリとトークンを入力してください'); return; }
  localStorage.setItem(GH_KEY, JSON.stringify({repo, branch, token}));
  lastGhPoll = 0; ghMsg('✔ 保存しました。'); pollAll();
}
function clearGh(){ localStorage.removeItem(GH_KEY); $('ghRepo').value=''; $('ghToken').value=''; ghMsg('設定を削除しました。'); }
function fillGhForm(){ const c = ghConf(); if (c){ $('ghRepo').value = c.repo||''; $('ghBranch').value = c.branch||''; $('ghToken').value = c.token||''; } }

async function fetchGh(file){
  const c = ghConf();
  const r = await fetch(`https://api.github.com/repos/${c.repo}/contents/${file}?ref=${c.branch||'main'}`, {
    headers: {Accept:'application/vnd.github.raw+json', Authorization:'Bearer '+c.token},
  });
  if (!r.ok) throw new Error('GitHub API '+r.status);
  return r.json();
}

let source = null; // 'local' | 'github' | null
async function fetchState(file){
  try{
    const r = await fetch('../state/' + file + '?t=' + Date.now());
    if (r.ok){ source = 'local'; return await r.json(); }
  }catch(e){}
  if (ghConf()){
    try{ const j = await fetchGh(file); source = 'github'; return j; }catch(e){}
  }
  return null;
}

/* ---------------- 状態 ---------------- */
let mode = 'office';
let company = null, agents = null;
let runsIndex = null, run = null, selectedRunId = null;

function setMode(m){
  mode = m;
  $('mOffice').classList.toggle('on', m==='office');
  $('mRuns').classList.toggle('on', m==='runs');
  $('officeMain').style.display = m==='office' ? 'flex' : 'none';
  $('runsMain').style.display = m==='runs' ? 'flex' : 'none';
  if (m==='runs') pollRuns();
  render();
}

/* ---------------- ポーリング ---------------- */
async function pollOffice(){
  const c = await fetchState('company.json');
  const a = await fetchState('agents.json');
  if (c) company = c;
  if (a) agents = a;
}
async function pollRuns(){
  const idx = await fetchState('runs/index.json');
  if (idx){
    runsIndex = idx;
    if (!selectedRunId && idx.runs && idx.runs.length) selectedRunId = idx.runs[idx.runs.length-1].id;
  }
  if (selectedRunId){
    const r = await fetchState('runs/' + selectedRunId + '.json');
    if (r) run = r;
  }
  render();
}
function selectRun(id){ selectedRunId = id; run = null; pollRuns(); }
async function pollAll(){
  await pollOffice();
  if (mode==='runs') await pollRuns();
  render();
}

/* ---------------- 描画 ---------------- */
function render(){
  renderKpis();
  if (mode==='office'){ renderNotice(); renderOffice(); renderDecisions(); renderMembers(); renderLog(); }
  else renderRun();
}

function renderKpis(){
  const k = $('kpis');
  if (mode==='office'){
    const c = company || {};
    const days = c.founded ? Math.max(0, Math.round((Date.now() - new Date(c.founded)) / 864e5)) : 0;
    $('coName').textContent = (c.company_name || 'AIカンパニー');
    k.innerHTML = kpi('経過','Day '+days) + kpi('現金',YEN(c.cash||0),'gold') + kpi('MRR',YEN(c.mrr||0),'green')
      + kpi('顧客',(c.customers||0)+'社','blue') + kpi('企業価値',YEN((c.mrr||0)*30+(c.cash||0)*0.6),'purple');
  } else {
    if (!run){ k.innerHTML=''; return; }
    const last = run.periods && run.periods.length ? run.periods[run.periods.length-1] : null;
    const kp = last ? last.kpi : {cash:0,mrr:0,customers:0};
    const prog = run.goal && run.goal.exit ? Math.min(999, Math.round(((kp.valuation||kp.mrr*60+kp.cash*0.6)/run.goal.exit)*100)) : null;
    k.innerHTML = kpi('経過', last ? last.label : '—')
      + kpi('現金', YEN(kp.cash), kp.cash < 0 ? 'red' : 'gold')
      + kpi('MRR', YEN(kp.mrr||0), 'green')
      + kpi('顧客', (kp.customers||0)+'社', 'blue')
      + (prog !== null ? kpi('目標達成', prog+'%', prog>=100?'gold':'purple') : '');
  }
}
function kpi(l,v,cls){ return `<div class="kpi"><div class="l">${l}</div><div class="v ${cls||''}">${v}</div></div>`; }

function renderNotice(){
  const n = $('liveNotice');
  if (source === 'local'){ n.className='ok'; n.textContent='🟢 このMacの state を直読み中'; }
  else if (source === 'github'){ n.className='ok'; n.textContent='☁️ GitHub経由で表示中（反映まで1〜2分）'; }
  else if (ghConf()){ n.className=''; n.textContent='⚠️ 接続できません。リポジトリ名・トークン・ネット接続を確認してください。'; }
  else { n.className=''; n.textContent='このMacでは serve.sh 経由で開くか、出先なら下の「☁️ リモート設定」を設定してください。'; }
}

function renderOffice(){
  const off = $('office');
  const W = off.clientWidth || 700;
  const list = agents ? agents.agents : [];
  let html = '<div class="window" style="left:8%"></div><div class="window" style="left:42%"></div><div class="window" style="right:8%"></div>';
  html += '<div class="deco" style="left:12px;top:76px">🪴</div><div class="deco" style="right:12px;top:76px">🪴</div>';
  html += '<div class="deco" style="left:14px;bottom:14px">☕️</div><div class="deco" style="right:14px;bottom:14px">🗄️</div>';

  const ceo = list.find(a=>a.id==='rei');
  const staff = list.filter(a=>a!==ceo);
  if (ceo){
    const nDec = ((company && company.pending_decisions) || []).length;
    const task = nDec ? `株主へ上申中 ${nDec}件…` : (ceo.current_task || '');
    html += deskHTML({...ceo, task}, W/2 - 75, 84, true);
  }
  const cols = Math.max(2, Math.min(4, Math.floor((W-40)/165)));
  const dx = Math.min(230, (W-40)/cols);
  const x0 = (W - dx*cols)/2 + (dx-150)/2;
  const rows = Math.ceil(staff.length/cols);
  staff.forEach((a,i)=>{
    const col = i % cols, row = Math.floor(i/cols);
    html += deskHTML({...a, task:a.current_task}, x0 + col*dx, 250 + row*155, false);
  });
  off.style.minHeight = (250 + rows*155 + 60) + 'px';
  off.innerHTML = html;
}

function deskHTML(a, x, y, owner){
  const st = a.status || 'idle';
  const task = st==='idle' ? '💤 待機中…' : (a.task || '…');
  const bubbleCls = st==='idle' ? 'bubble zzz' : 'bubble';
  return `<div class="desk ${st} ${owner?'owner':''}" style="left:${x}px;top:${y}px">
    <div style="position:relative;display:inline-block">
      <div class="${bubbleCls}">${esc(task)}</div>
      <span class="chair">${a.avatar}<span class="dot ${st}"></span></span>
    </div>
    <div class="table"></div>
    <div class="name">${esc(a.name)}${owner?' ⭐️':''}</div>
    <div class="role">${esc(a.role)}</div>
  </div>`;
}

function boardHTML(b){
  if (!b) return '';
  const merits = (b.merits||[]).map(m=>`<li>${esc(m)}</li>`).join('');
  const demerits = (b.demerits||[]).map(m=>`<li>${esc(m)}</li>`).join('');
  const voices = (b.voices||[]).map(v=>`${v.av||''}「${esc(v.say)}」`).join('　');
  return `<div class="board">
    <div class="rec">🏛 役員会の結論: ${esc(b.rec||'')}</div>
    ${merits ? `<div><b>メリット</b><ul class="plus">${merits}</ul></div>` : ''}
    ${demerits ? `<div><b>デメリット</b><ul class="minus">${demerits}</ul></div>` : ''}
    ${voices ? `<div class="voices">${voices}</div>` : ''}
  </div>`;
}

function renderDecisions(){
  const list = (company && company.pending_decisions) || [];
  $('decCount').style.display = list.length ? 'inline-block' : 'none';
  $('decCount').textContent = list.length;
  $('decisions').innerHTML = list.length
    ? list.map(d=>{
        const b = (d.merits||d.demerits||d.recommendation) ? {
          rec: d.recommendation, merits: d.merits, demerits: d.demerits,
          voices: (d.opinions||[]).map(o=>({av:'', say:`${o.name}（${o.stance}）${o.comment||''}`})),
        } : null;
        return `<div class="card decision"><div class="t">${esc(d.title||'判断待ち')}</div><div class="d">${esc(d.desc||'')}</div>${boardHTML(b)}<div class="d" style="color:var(--gold)">→ Claudeに「${esc(d.title||'この件')}を承認/見送りで」と指示すれば反映されます</div></div>`;
      }).join('')
    : '<div class="empty">いま判断待ちの案件はありません。</div>';
}

function renderMembers(){
  const list = agents ? agents.agents : [];
  $('members').innerHTML = list.map(a=>{
    const st = a.status||'idle';
    return `<div class="member"><span class="av">${a.avatar}</span>
      <div class="info"><div class="nm">${esc(a.name)}<span>${esc(a.role)}</span></div>
      <div class="tk">${esc(st==='idle' ? '待機中' : (a.current_task||''))}</div></div>
      <span class="st ${st}">${STATUS_JA[st]||st}</span></div>`;
  }).join('');
}

function renderLog(){
  const list = (company && company.log) || [];
  $('log').innerHTML = list.slice().reverse().slice(0,40).map(l=>
    `<div><span class="day">${esc(l.date||'')}</span>${esc(l.text)}</div>`).join('') || '<div class="empty">ログなし</div>';
}

/* ---------------- 経営ラン ビューア ---------------- */
function chartSVG(ps){
  if (!ps || ps.length < 2) return '';
  const W=640, H=170, pad=34;
  const cash = ps.map(p=>p.kpi.cash), mrr = ps.map(p=>p.kpi.mrr||0);
  const all = [...cash, ...mrr, 0];
  let min = Math.min(...all), max = Math.max(...all);
  if (max === min) max = min + 1;
  max += (max-min)*0.06;
  const x = i => pad + (W-2*pad) * (i/(ps.length-1));
  const y = v => H-22 - (H-44) * ((v-min)/(max-min));
  const line = arr => arr.map((v,i)=>`${i?'L':'M'}${x(i).toFixed(1)},${y(v).toFixed(1)}`).join('');
  const zero = min < 0 ? `<line x1="${pad}" x2="${W-pad}" y1="${y(0)}" y2="${y(0)}" stroke="#f87171" stroke-dasharray="4 3" opacity=".6"/>` : '';
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;background:var(--bg);border:1px solid var(--line);border-radius:10px">
    ${zero}
    <path d="${line(cash)}" fill="none" stroke="#fbbf24" stroke-width="2"/>
    <path d="${line(mrr)}" fill="none" stroke="#4ade80" stroke-width="2"/>
    <text x="${pad}" y="15" fill="#fbbf24" font-size="11">━ 現金</text>
    <text x="${pad+64}" y="15" fill="#4ade80" font-size="11">━ MRR</text>
  </svg>`;
}

function renderRun(){
  const sel = $('runSel');
  const list = (runsIndex && runsIndex.runs) || [];
  sel.innerHTML = list.length
    ? list.slice().reverse().map(r=>`<option value="${esc(r.id)}" ${r.id===selectedRunId?'selected':''}>${esc(r.title || r.id)}</option>`).join('')
    : '<option>（ランなし）</option>';
  const stEl = $('runStatus');
  if (!run){
    stEl.style.display = 'none';
    $('runBody').innerHTML = '<div id="runEmpty">まだ経営ランがありません。<br>このMacの Claude Code に<b>「経営ランを回して」</b>と伝えると、<br>検証済みプランを元にAI経営陣が仮想経営を開始し、ここに月次で経過が流れます。</div>';
    return;
  }
  stEl.style.display = 'inline-block';
  stEl.className = 'runstatus ' + (run.status||'running');
  stEl.textContent = RUN_STATUS_JA[run.status] || run.status;

  let html = '';
  // ヘッダーカード
  html += `<div class="runcard"><h3>${esc(run.title || run.id)}</h3>
    <div class="sub">プラン: ${esc(run.plan||'—')} ｜ 目標: ${run.goal ? YEN(run.goal.exit)+' Exit（'+(run.goal.deadline_months||48)+'ヶ月以内）' : '—'} ｜ 開始: ${esc(run.started||'—')}</div>
    ${run.learnings_applied && run.learnings_applied.length ? `<div class="sub" style="margin-top:6px">適用した教訓:</div><ul class="learn">${run.learnings_applied.map(l=>`<li>${esc(l)}</li>`).join('')}</ul>` : ''}
  </div>`;
  // 判定カード
  if (run.verdict){
    const v = run.verdict;
    html += `<div class="runcard verdict ${run.status}">
      <h3>${RUN_STATUS_JA[run.status]||''}</h3>
      ${v.price ? `<div class="big" style="color:var(--gold)">${YEN(v.price)}</div>` : ''}
      <div class="sub">${esc(v.reason||'')}</div>
      ${v.report ? `<div class="sub" style="margin-top:4px">📄 詳細レポート: state/${esc(v.report)}</div>` : ''}
    </div>`;
  }
  // 壁
  if (run.walls && run.walls.length){
    html += `<div class="runcard"><h3>ぶつかった壁</h3><ul class="walls">${run.walls.map(w=>`<li>${esc(w)}</li>`).join('')}</ul></div>`;
  }
  // チャート
  html += chartSVG(run.periods);
  // 月次タイムライン（新しい順）
  const ps = (run.periods||[]).slice().reverse();
  html += ps.map(p=>{
    const acts = (p.actions||[]).map(a=>`<div class="act"><b>${esc(a.role)}</b>: ${esc(a.text)}</div>`).join('');
    const evs = (p.events||[]).map(e=>`<div class="ev ${e.type==='wall'?'wall':'event'}">${e.type==='wall'?'⚠️ ':''}${esc(e.text)}</div>`).join('');
    return `<div class="card period"><div class="t">${esc(p.label)}<span class="pk">現金 ${YEN(p.kpi.cash)} ／ MRR ${YEN(p.kpi.mrr||0)} ／ 顧客 ${p.kpi.customers||0}</span></div>
      ${p.summary ? `<div class="d">${esc(p.summary)}</div>` : ''}
      ${acts}${evs}</div>`;
  }).join('');
  $('runBody').innerHTML = html;
}

/* ---------------- 起動 ---------------- */
fillGhForm();
pollAll();
setInterval(()=>{
  // GitHub経由の場合はAPIレート節約のため間隔を空ける
  if (source === 'github' && Date.now() - lastGhPoll < 20000) return;
  if (source === 'github') lastGhPoll = Date.now();
  pollAll();
}, 6000);
window.addEventListener('resize', render);
</script>
